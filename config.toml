# #############################################################################
#  麦麦！我的sex图呢？ — Runtime Configuration
#  v3.0.0 — Lolicon API 版本
# #############################################################################

# ═══════════════════════════════════════════════════════════════════════════
#  插件设置 / Plugin Settings
# ═══════════════════════════════════════════════════════════════════════════
[plugin]
config_version = "3.2.0"
enabled = true

# ═══════════════════════════════════════════════════════════════════════════
#  Lolicon API 设置 / API Settings
# ═══════════════════════════════════════════════════════════════════════════

[api]
# 标签模板列表 / Tag templates
# 每个字符串是一个模板，多个标签用逗号分隔（AND关系）
# e.g. "少女,猫" 搜索同时包含「少女」和「猫」的图片
tags = []
tag_templates = [
    "猫",
    "少女",
]
per_tag_count = 20
age_rating = "safe"
exclude_ai = true
image_size = "regular"

[proxy]
enabled = false
url = "http://127.0.0.1:7890"

# ═══════════════════════════════════════════════════════════════════════════
#  定时爬取 / Scheduled Crawl
# ═══════════════════════════════════════════════════════════════════════════

[schedule]
enabled = false
times = [
    "03:00",
    "15:00",
]
# 当图片库为空时自动爬取
auto_crawl_when_empty = true
# 自动爬取时每个标签拉取的数量（可调整）
auto_crawl_count = 15
crawl_trigger_keywords = ["立刻爬取"]

# ═══════════════════════════════════════════════════════════════════════════
#  @ 模式 / @-Mention Mode
# ═══════════════════════════════════════════════════════════════════════════

[at_mode]
enabled = true
require_at_group = true
require_at_private = false
bot_name = "星宫"
# @ 拦截提示，留空=静默不回复
reject_message = ""

# ═══════════════════════════════════════════════════════════════════════════
#  发送设置 / Send Settings
# ═══════════════════════════════════════════════════════════════════════════

[send]
trigger_keywords = [
    "涩图",
    "看看腿",
    "看看脸",
]
count = 3

# ═══════════════════════════════════════════════════════════════════════════
#  存储设置 / Storage Settings
# ═══════════════════════════════════════════════════════════════════════════

[storage]
image_dir = "images"
max_total_images = 50
max_image_size_mb = 20.0
